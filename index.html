<!DOCTYPE html>
<html>
  <head>
    <title>Your Giga Pet</title>
    <meta name="description" content="A cool thing made with Glitch">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-2.2.1.min.js"
            integrity="sha256-gvQgAFzTH6trSrAWoH1iPo9Xc96QxSZ3feW6kem+O00="
            crossorigin="anonymous"></script>
    <script src="script.js" defer></script>
  </head>
  <body>
    <main>
      <section class="pet-image-container">
         <span id="message-anchor"></span>
         <img class="pet-image" src="images/default.png" alt="My Giga Pet">
      </section>
      
      <section class="dashboard">
        <div>Name: <strong><span class="name"></span></strong></div>
        <div>Weight: <strong><span class="weight"></span> pounds</strong></div>
        <div>Happiness: <strong><span class="happiness"></span> purrs (per min)</strong></div>
        
        <div class="button-container">
          <button class="treat-button" title="Give a Treat"><i class="fa-solid fa-fish"></i></button>
          <button class="play-button" title="Play a Game"><i class="fa-solid fa-baseball-bat-ball"></i></button>
          <button class="exercise-button" title="Get some Exercise"><i class="fa-solid fa-dumbbell"></i></i></button>
          <button class="nap-button" title="Take a Nap"><i class="fa-solid fa-bed"></i></button>
        </div>
      </section>
    </main>
  </body>
</html>
